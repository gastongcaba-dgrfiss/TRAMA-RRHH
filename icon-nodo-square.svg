<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111e3a"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1e3a63" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e3a63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect width="512" height="512" rx="104" fill="url(#bgGlow)"/>

  <polygon points="256,106 385.9,181 385.9,331 256,406 126.1,331 126.1,181"
    fill="none" stroke="#7dd3fc" stroke-opacity="0.35" stroke-width="4" stroke-linejoin="round"/>

  <g stroke-width="5" stroke-linecap="round" filter="url(#lineGlow)">
    <line x1="256" y1="256" x2="256" y2="106" stroke="#38bdf8"/>
    <line x1="256" y1="256" x2="385.9" y2="181" stroke="#818cf8"/>
    <line x1="256" y1="256" x2="385.9" y2="331" stroke="#a78bfa"/>
    <line x1="256" y1="256" x2="256" y2="406" stroke="#34d399"/>
    <line x1="256" y1="256" x2="126.1" y2="331" stroke="#fbbf24"/>
    <line x1="256" y1="256" x2="126.1" y2="181" stroke="#fb7185"/>
  </g>

  <circle cx="256" cy="256" r="40" fill="url(#centerGlow)" filter="url(#softGlow)"/>

  <g filter="url(#softGlow)">
    <circle cx="256" cy="106" r="22" fill="#38bdf8"/>
    <circle cx="385.9" cy="181" r="22" fill="#818cf8"/>
    <circle cx="385.9" cy="331" r="22" fill="#a78bfa"/>
    <circle cx="256" cy="406" r="22" fill="#34d399"/>
    <circle cx="126.1" cy="331" r="22" fill="#fbbf24"/>
    <circle cx="126.1" cy="181" r="22" fill="#fb7185"/>
  </g>
</svg>

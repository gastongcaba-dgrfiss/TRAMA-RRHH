  <style>
    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273548;
      --border:    #334155;
      --accent:    #38bdf8;
      --accent2:   #818cf8;
      --success:   #34d399;
      --warning:   #fbbf24;
      --danger:    #f87171;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overscroll-behavior: none;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .today-badge {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--muted);
    }
    nav { display: flex; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1; min-width: 90px; padding: 10px 8px;
      border: none; background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; text-align: center;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-icon { display: block; font-size: 18px; margin-bottom: 2px; }
    main { padding: 20px; max-width: 600px; margin: 0 auto; }
    .page { display: none; }
    .page.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn {
      border: none; border-radius: var(--radius-sm);
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, select, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-size: 14px; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--surface); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; display: none; align-items: flex-end;
      justify-content: center; padding: 0;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px; width: 100%; max-width: 600px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }

    .badge-purple { background: rgba(129,140,248,0.15); color: var(--accent2); }

    .badge-yellow { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge-red    { background: rgba(248,113,113,0.15); color: var(--danger); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .dot-alta { background: var(--danger); }
    .dot-media { background: var(--warning); }
    .dot-baja { background: var(--success); }
    .task-item {

      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;

    .task-check.done { background: var(--success); border-color: var(--success); }
    .task-check.done::after { content: 'âœ“'; font-size: 11px; color: #0f172a; font-weight: 700; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }

    .proceso-toggle {

    .pendiente-check {

    .pendiente-check.done { background: var(--success); border-color: var(--success); }
    .pendiente-check.done::after { content: 'âœ“'; font-size: 10px; color: #0f172a; font-weight: 700; }
    .pendiente-text { flex: 1; }
    .pendiente-text.done { text-decoration: line-through; color: var(--muted); }
    .month-nav { display: flex; align-items: center; gap: 8px; }
    .month-label { font-size: 14px; font-weight: 600; min-width: 130px; text-align: center; }
    .sheet-status { font-size: 12px; color: var(--muted); }
    .sheet-search { margin-bottom: 12px; }
    .sheet-item {

    .sheet-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .sheet-meta { font-size: 12px; color: var(--muted); line-height: 1.45; }
    .sheet-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .sheet-alert { border-left: 4px solid var(--warning); }
    .sheet-alert.VENCIDO, .sheet-alert.URGENTE { border-left-color: var(--danger); }
    .sheet-alert.JUBILACION { border-left-color: var(--accent2); }

    .sheet-alert.COMISION { border-left-color: var(--warning); }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 18px; font-size: 13px;
      z-index: 400; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;

    .toast.show { transform: translateX(-50%) translateY(0); }
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); color: #0f172a; font-size: 24px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(56,189,248,0.4);
      z-index: 50; transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.9); }
    .fab.hidden { display: none; }
    @media (min-width: 600px) {
      main { padding: 24px; }
      .modal { border-radius: var(--radius); margin: auto; }
      .modal-overlay { align-items: center; padding: 20px; }
    }
  </style>
</head>

  if (!state.procesos || state.procesos.length === 0) {

      { id: 'p4', name: 'Vacaciones Planta', desc: 'Registrar y actualizar en Drive' },
      { id: 'p5', name: 'Vacaciones LOYS', desc: 'Registrar y actualizar en Drive' },
      { id: 'p6', name: 'Contratos LOYS', desc: 'Revisar vencimientos y novedades' },
    ];
    save();
  }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function monthKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
function formatDate(s) { if(!s) return ''; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y; }
function isOverdue(s) { if(!s) return false; return new Date(s) < new Date(new Date().toDateString()); }
const CAT_LABELS = { rrhh:'RRHH', admin:'Admin', tech:'Tech', seleccion:'SelecciÃ³n', comunicacion:'ComunicaciÃ³n', otro:'Otro' };
const CAT_COLORS = { rrhh:'badge-blue', admin:'badge-purple', tech:'badge-green', seleccion:'badge-yellow', comunicacion:'badge-blue', otro:'badge-yellow' };
const PRIO_LABELS = { alta:'ðŸ”´ Alta', media:'ðŸŸ¡ Media', baja:'ðŸŸ¢ Baja' };
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function setSheetStatus(text) {
  const status = document.getElementById('sheetStatus');
  const alertStatus = document.getElementById('alertasStatus');
  if (status) status.textContent = text;
  if (alertStatus) alertStatus.textContent = text;
}
async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== '') url.searchParams.set(key, value);
  });
  const res = await fetch(url.toString(), { method: 'GET' });
  if (!res.ok) throw new Error('Respuesta HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function loadSheetData() {
  sheetError = '';
  setSheetStatus('Conectando con Google Sheets...');
  try {
    const [nomina, alertas] = await Promise.all([
      apiGet('nomina'),
      apiGet('alertas')
    ]);
    nominaData = nomina.personas || [];
    alertasData = alertas.alertas || [];
    alertasResumen = alertas.resumen || null;
    sheetLoadedAt = new Date();
    const stamp = sheetLoadedAt.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    setSheetStatus(`Conectado. ${nominaData.length} personas y ${alertasData.length} alertas. Actualizado ${stamp}.`);
  } catch (err) {
    sheetError = err.message || 'No se pudo conectar con Google Sheets';
    setSheetStatus('No se pudo conectar: ' + sheetError);
  }
  renderNomina();
  renderAlertas();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('tab-'+page).classList.add('active');
  document.getElementById('fab').classList.toggle('hidden', page !== 'pendientes');
  render();
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// TASKS
function openNewTask() {
  editingTaskId = null;
  document.getElementById('modalTaskTitle').textContent = 'Nueva tarea';
  ['taskTitleInput','taskNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('taskCat').value = 'rrhh';
  document.getElementById('taskPriority').value = 'media';
  document.getElementById('taskDate').value = '';
  openModal('modalNewTask');
}
function saveTask() {
  const title = document.getElementById('taskTitleInput').value.trim();
  if (!title) { showToast('IngresÃ¡ el nombre de la tarea'); return; }
  if (editingTaskId) {
    const t = state.tasks.find(t => t.id === editingTaskId);
    if (t) {
      t.title = title;
      t.cat = document.getElementById('taskCat').value;
      t.priority = document.getElementById('taskPriority').value;
      t.date = document.getElementById('taskDate').value;
      t.note = document.getElementById('taskNote').value;
    }
    editingTaskId = null;
    showToast('Tarea actualizada');
  } else {
    state.tasks.unshift({ id: uid(), title,
      cat: document.getElementById('taskCat').value,
      priority: document.getElementById('taskPriority').value,
      date: document.getElementById('taskDate').value,
      note: document.getElementById('taskNote').value,
      done: false, createdAt: Date.now()
    });
    showToast('Tarea creada');
  }
  save(); closeModal('modalNewTask'); closeModal('modalViewTask'); render();
}
function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
function filterTasks(f) {
  currentFilter = f;
  ['todas','pendiente','alta','media','baja'].forEach(x => {
    document.getElementById('f-'+x).classList.toggle('btn-primary', x===f);
    document.getElementById('f-'+x).classList.toggle('btn-ghost', x!==f);
  });
  renderTasks();
}
function viewTask(id) {
  viewingTaskId = id;
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('modalViewContent').innerHTML = `
    <div style="margin-bottom:12px;">
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;">${t.title}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge ${CAT_COLORS[t.cat]}">${CAT_LABELS[t.cat]}</span>
        <span class="badge ${t.priority==='alta'?'badge-red':t.priority==='media'?'badge-yellow':'badge-green'}">${PRIO_LABELS[t.priority]}</span>
        ${t.done ? '<span class="badge badge-green">âœ“ Completada</span>' : ''}
      </div>
    </div>
    ${t.date ? `<div style="margin-bottom:10px;"><span style="font-size:12px;color:var(--muted);">Fecha lÃ­mite: </span><span style="font-size:13px;${isOverdue(t.date)&&!t.done?'color:var(--danger)':''}">
      ${formatDate(t.date)}${isOverdue(t.date)&&!t.done?' âš ï¸ Vencida':''}</span></div>` : ''}
    ${t.note ? `<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--muted);">${t.note}</div>` : ''}
  `;
  openModal('modalViewTask');
}
function editCurrentTask() {
  const t = state.tasks.find(t => t.id === viewingTaskId);
  if (!t) return;
  editingTaskId = t.id;
  document.getElementById('modalTaskTitle').textContent = 'Editar tarea';
  document.getElementById('taskTitleInput').value = t.title;
  document.getElementById('taskCat').value = t.cat;
  document.getElementById('taskPriority').value = t.priority;
  document.getElementById('taskDate').value = t.date || '';
  document.getElementById('taskNote').value = t.note || '';
  closeModal('modalViewTask'); openModal('modalNewTask');
}
function deleteCurrentTask() {
  state.tasks = state.tasks.filter(t => t.id !== viewingTaskId);
  save(); closeModal('modalViewTask'); showToast('Tarea eliminada'); render();
}
function renderTasks() {
  let tasks = [...state.tasks];
  if (currentFilter==='pendiente') tasks = tasks.filter(t=>!t.done);
  else if (['alta','media','baja'].includes(currentFilter)) tasks = tasks.filter(t=>t.priority===currentFilter);
  const prioOrder = {alta:0,media:1,baja:2};
  tasks.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(prioOrder[a.priority]!==prioOrder[b.priority]) return prioOrder[a.priority]-prioOrder[b.priority];
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    return 0;
  });
  const total=state.tasks.length, done=state.tasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressLabel').textContent=`${done} de ${total} completadas`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  const alta=state.tasks.filter(t=>!t.done&&t.priority==='alta').length;
  const overdue=state.tasks.filter(t=>!t.done&&isOverdue(t.date)).length;
  document.getElementById('statsBadges').innerHTML=[
    alta?`<span class="badge badge-red">ðŸ”´ ${alta} urgente${alta>1?'s':''}</span>`:'',
    overdue?`<span class="badge badge-yellow">âš ï¸ ${overdue} vencida${overdue>1?'s':''}</span>`:'',
    done?`<span class="badge badge-green">âœ“ ${done} lista${done>1?'s':''}</span>`:''
  ].join('');
  const list=document.getElementById('taskList');
  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">âœ…</div><div class="empty-text">${currentFilter==='todas'?'Sin tareas. TocÃ¡ + para agregar.':'Sin tareas con este filtro.'}</div></div>`;
    return;
  }
  list.innerHTML=tasks.map(t=>`
    <div class="task-item" style="${t.done?'opacity:0.6':''}">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-body" onclick="viewTask('${t.id}')">
        <div class="task-title ${t.done?'done':''}">${t.title}</div>
        <div class="task-meta">
          <span class="badge ${CAT_COLORS[t.cat]}">${CAT_LABELS[t.cat]}</span>
          <span class="dot dot-${t.priority}"></span>
          ${t.date?`<span class="task-date ${isOverdue(t.date)&&!t.done?'overdue':''}">${isOverdue(t.date)&&!t.done?'âš ï¸ ':''}${formatDate(t.date)}</span>`:''}
        </div>
      </div>
    </div>
  `).join('');
}

// PROCESOS
function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+dir, 1);
  renderProcesos();
}
function toggleProceso(id) {
  const key=monthKey(currentMonth);
  if(!state.procesoChecks[key]) state.procesoChecks[key]={};
  state.procesoChecks[key][id]=!state.procesoChecks[key][id];
  save(); renderProcesos();
}
function saveProceso() {
  const name=document.getElementById('procesoNameInput').value.trim();
  if(!name){showToast('IngresÃ¡ el nombre');return;}
  state.procesos.push({id:uid(),name,desc:document.getElementById('procesoDescInput').value.trim()});
  document.getElementById('procesoNameInput').value='';
  document.getElementById('procesoDescInput').value='';
  save(); closeModal('modalAddProceso'); showToast('Proceso agregado'); renderProcesos();
}
function renderProcesos() {
  const key=monthKey(currentMonth), checks=state.procesoChecks[key]||{};
  document.getElementById('monthLabel').textContent=MONTHS_ES[currentMonth.getMonth()]+' '+currentMonth.getFullYear();
  const total=state.procesos.length, done=state.procesos.filter(p=>checks[p.id]).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('procesoProgressLabel').textContent=`${done} de ${total} completados`;
  document.getElementById('procesoProgressPct').textContent=pct+'%';
  document.getElementById('procesoProgressFill').style.width=pct+'%';
  document.getElementById('procesoList').innerHTML=state.procesos.map(p=>{
    const d=!!checks[p.id];
    return `<div class="proceso-item" onclick="toggleProceso('${p.id}')">
      <div class="proceso-toggle ${d?'done':''}"></div>
      <div class="proceso-info">
        <div class="proceso-name ${d?'done':''}">${p.name}</div>
        ${p.desc?`<div class="proceso-sub">${p.desc}</div>`:''}
      </div>
      ${d?'<span class="badge badge-green">Listo</span>':'<span class="badge" style="background:rgba(148,163,184,0.1);color:var(--muted);">Pendiente</span>'}
    </div>`;
  }).join('');
}

// GOOGLE SHEETS
function renderNomina() {
  const list = document.getElementById('nominaList');
  if (!list) return;
  if (sheetError && nominaData.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">!</div><div class="empty-text">${escapeHtml(sheetError)}</div></div>`;
    return;
  }
  const q = (document.getElementById('nominaSearch')?.value || '').toLowerCase().trim();
  let personas = nominaData;
  if (q) {
    personas = personas.filter(p => [
      p.apellido, p.nombre, p.cargo, p.area, p.tipoContrato, p.estadoContrato
    ].join(' ').toLowerCase().includes(q));
  }
  if (!personas.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">Sheets</div><div class="empty-text">${nominaData.length ? 'Sin resultados para esa busqueda.' : 'Todavia no hay datos cargados desde Sheets.'}</div></div>`;
    return;
  }
  list.innerHTML = personas.slice(0, 80).map(p => `
    <div class="sheet-item">
      <div class="sheet-row">
        <div>
          <div class="sheet-title">${escapeHtml(p.apellido)}, ${escapeHtml(p.nombre)}</div>
          <div class="sheet-meta">${escapeHtml(p.cargo || 'Sin cargo')} - ${escapeHtml(p.area || 'Sin area')}</div>
          <div class="sheet-meta">${escapeHtml(p.tipoContrato || 'Sin contrato')} - ${escapeHtml(p.estadoContrato || 'Sin estado')}</div>
        </div>
        ${p.fechaVenc ? `<span class="badge badge-yellow">${escapeHtml(p.fechaVenc)}</span>` : ''}
      </div>
    </div>
  `).join('') + (personas.length > 80 ? `<div class="sheet-status" style="text-align:center;margin:8px 0 20px;">Mostrando 80 de ${personas.length}. Usa la busqueda para afinar.</div>` : '');
}
function renderAlertas() {
  const list = document.getElementById('alertasList');
  const resumen = document.getElementById('alertasResumen');
  if (!list || !resumen) return;
  if (sheetError && alertasData.length === 0) {
    resumen.innerHTML = '';
    list.innerHTML = `<div class="empty"><div class="empty-icon">!</div><div class="empty-text">${escapeHtml(sheetError)}</div></div>`;
    return;
  }
  if (alertasResumen) {
    resumen.innerHTML = `<div class="card"><div style="display:flex;gap:8px;flex-wrap:wrap;">
      <span class="badge badge-red">${alertasResumen.vencidos || 0} vencidos</span>
      <span class="badge badge-yellow">${alertasResumen.urgentes || 0} urgentes</span>
      <span class="badge badge-blue">${alertasResumen.proximos || 0} proximos</span>
      <span class="badge badge-purple">${alertasResumen.jubilacion || 0} jubilacion</span>
      <span class="badge badge-green">${alertasResumen.licencias || 0} licencias</span>
      <span class="badge badge-yellow">${alertasResumen.comisiones || 0} comisiones</span>
    </div></div>`;
  } else {
    resumen.innerHTML = '';
  }
  if (!alertasData.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">OK</div><div class="empty-text">Sin alertas cargadas desde Sheets.</div></div>`;
    return;
  }
  list.innerHTML = alertasData.map(a => `
    <div class="sheet-item sheet-alert ${escapeHtml(a.tipo)}">
      <div class="sheet-row">
        <div>
          <div class="sheet-title">${escapeHtml(a.icono || '')} ${escapeHtml(a.persona || '')}</div>
          <div class="sheet-meta">${escapeHtml(a.mensaje || '')}</div>
          <div class="sheet-meta">${escapeHtml(a.area || 'Sin area')} - ${escapeHtml(a.cargo || 'Sin cargo')}</div>
        </div>
        <span class="badge ${a.tipo === 'VENCIDO' || a.tipo === 'URGENTE' ? 'badge-red' : 'badge-yellow'}">${escapeHtml(a.tipo || '')}</span>
      </div>
    </div>
  `).join('');
}

function render() {
  if(currentPage==='pendientes') renderTasks();
  if(currentPage==='procesos') renderProcesos();
  if(currentPage==='equipo') renderEquipo();
  if(currentPage==='nomina') renderNomina();
  if(currentPage==='alertas') renderAlertas();
}
